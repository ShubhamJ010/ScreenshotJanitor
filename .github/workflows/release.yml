name: Android Release Pipeline

on:
  push:
    tags:
      - "v*" # Triggers the workflow on any tag push starting with 'v'

jobs:
  build-and-release:
    name: Build APK and Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for generating an accurate changelog from git history

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu" # Highly stable distribution for Android builds
          java-version: "17" # Standard version required for modern Android/Android 14+ toolchains

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant Execute Permission to Gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
        # Note: If your project uses build variants/flavors, you might need to adjust this
        # to something like `./gradlew assembleFullRelease`

      - name: Sign APK (Optional but Recommended for Android 14+)
        # If you have signing keys configured in your repository secrets, uncomment this section.
        # Android 14+ strictly enforces valid V2/V3 signing schemes for installation.
        # uses: r0adkll/sign-android-release@v1
        # id: sign_app
        # with:
        #   releaseDirectory: app/build/outputs/apk/release
        #   signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        #   alias: ${{ secrets.ALIAS }}
        #   keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        #   keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Generate Automatic Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
